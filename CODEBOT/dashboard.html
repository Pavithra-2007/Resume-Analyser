<!DOCTYPE html>
<html>
<head>
    <title>CODEBOT – Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>📊 Resume Tracking Dashboard</h1>

<div class="container">
<table border="1" width="100%">
<tr>
<th>ID</th><th>Name</th><th>Email</th><th>Phone</th>
<th>Role</th><th>Match %</th><th>Score</th><th>Status</th>
</tr>
<tbody id="rows"></tbody>
</table>
</div>

<script>
const data = JSON.parse(localStorage.getItem("trackingData")) || [];
const rows = document.getElementById("rows");

data.forEach(d => {
    rows.innerHTML += `
        <tr>
            <td>${d.candidateId}</td>
            <td>${d.name}</td>
            <td>${d.email}</td>
            <td>${d.phone}</td>
            <td>${d.role}</td>
            <td>${d.match}%</td>
            <td>${d.score}</td>
            <td>${d.status}</td>
        </tr>
    `;
});
</script>

</body>
</html>
